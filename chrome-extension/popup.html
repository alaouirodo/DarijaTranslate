<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DarijaTranslate</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <div class="brand">
      <span class="logo">DT</span>
      <h1>DarijaTranslate</h1>
    </div>
    <div class="actions">
      <button id="settingsBtn" title="Settings" aria-label="Settings">Settings</button>
    </div>
  </div>

  <div id="loginSection" class="card hidden">
    <h2>Login Required</h2>
    <div class="input-group">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Enter username">
    </div>
    <div class="input-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter password">
    </div>
    <button id="loginBtn" class="btn primary full-width">Sign In</button>
    <div id="loginStatus" class="status-msg"></div>
  </div>

  <div id="mainSection" class="hidden">
    <div class="input-container">
      <textarea id="inputText" placeholder="Type or speak English text..."></textarea>
      <button id="clearBtn" class="icon-btn" title="Clear text" aria-label="Clear text">X</button>
      <button id="micBtn" class="icon-btn pulse-target" title="Start voice input" aria-label="Microphone">Mic</button>
    </div>

    <div class="output-card card">
      <div class="output-header">
        <span class="lang-tag">Darija</span>
      </div>

      <div id="outputContainer" class="output-content">
        <div class="placeholder-text">Translation will appear here...</div>
      </div>

      <div class="output-actions">
        <button id="speakBtn" class="btn icon-text" title="Listen" disabled>
          <span class="icon">Listen</span>
        </button>
        <button id="copyBtn" class="icon-btn" title="Copy to clipboard" disabled>Copy</button>
      </div>
    </div>
  </div>

  <div id="statusBar"></div>

  <script src="popup.js"></script>
</body>
</html>
